<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boom Song Request - DJ Control</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background:
                radial-gradient(circle at top, rgba(255, 196, 0, 0.10), transparent 25%),
                linear-gradient(180deg, #080808 0%, #000000 100%);
            color: white;
            min-height: 100vh;
        }

        .wrapper {
            max-width: 1300px;
            margin: 0 auto;
            padding: 24px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 22px;
            gap: 16px;
            flex-wrap: wrap;
        }

        .brand h1 {
            margin: 0;
            color: #ffd54a;
            font-size: 34px;
        }

        .brand p {
            margin: 6px 0 0 0;
            color: #cfcfcf;
        }

        .badge {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 14px;
            padding: 12px 16px;
            color: #fff;
        }

        .grid {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 20px;
        }

        .panel {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 14px 30px rgba(0,0,0,0.22);
        }

        .panel h2 {
            margin: 0 0 16px 0;
            color: #ffd54a;
            font-size: 24px;
        }

        .password-row {
            display: flex;
            gap: 10px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }

        input {
            flex: 1;
            min-width: 220px;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.08);
            color: white;
            font-size: 15px;
            outline: none;
        }

        button {
            border: none;
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }

        .primary-btn {
            background: linear-gradient(45deg, #ffd54a, #ff9f1a);
            color: black;
        }

        .secondary-btn {
            background: rgba(255,255,255,0.08);
            color: white;
            border: 1px solid rgba(255,255,255,0.12);
        }

        .danger-btn {
            background: linear-gradient(45deg, #ff4d4d, #c40000);
            color: white;
        }

        .success-btn {
            background: linear-gradient(45deg, #27d17f, #0e9f5b);
            color: white;
        }

        .queue-item,
        .pending-item {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
        }

        .queue-head,
        .pending-head {
            display: flex;
            justify-content: space-between;
            gap: 14px;
            flex-wrap: wrap;
            align-items: center;
        }

        .song-name {
            font-size: 20px;
            font-weight: bold;
            color: white;
        }

        .tier {
            display: inline-block;
            padding: 8px 12px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: bold;
        }

        .vip {
            background: linear-gradient(45deg, #ffd54a, #ff9f1a);
            color: black;
        }

        .express {
            background: linear-gradient(45deg, #4dc3ff, #277bff);
            color: white;
        }

        .standard {
            background: rgba(255,255,255,0.14);
            color: white;
        }

        .meta {
            color: #d0d0d0;
            font-size: 14px;
            margin-top: 8px;
            line-height: 1.6;
            word-break: break-word;
        }

        .actions {
            display: flex;
            gap: 10px;
            margin-top: 14px;
            flex-wrap: wrap;
        }

        .small {
            font-size: 13px;
            color: #bbbbbb;
        }

        .status-box {
            margin-top: 16px;
            min-height: 46px;
            border-radius: 12px;
            padding: 12px 14px;
            background: rgba(255,255,255,0.04);
            color: #ededed;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }

        .stat {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            padding: 16px;
            text-align: center;
        }

        .stat-number {
            font-size: 28px;
            color: #ffd54a;
            font-weight: bold;
        }

        .stat-label {
            margin-top: 6px;
            color: #d2d2d2;
            font-size: 13px;
        }

        .empty {
            color: #bdbdbd;
            text-align: center;
            padding: 28px 10px;
        }

        @media (max-width: 1000px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="topbar">
            <div class="brand">
                <h1>BOOM SONG REQUEST 💥</h1>
                <p>DJ Control Dashboard</p>
            </div>
            <div class="badge" id="liveClock">LIVE</div>
        </div>

        <div class="password-row">
            <input type="password" id="djPassword" placeholder="Enter DJ password">
            <button class="primary-btn" onclick="savePassword()">Save Password</button>
            <button class="danger-btn" onclick="clearQueue()">Clear Queue</button>
        </div>

        <div class="stats">
            <div class="stat">
                <div class="stat-number" id="vipCount">0</div>
                <div class="stat-label">VIP Waiting</div>
            </div>
            <div class="stat">
                <div class="stat-number" id="expressCount">0</div>
                <div class="stat-label">Express Waiting</div>
            </div>
            <div class="stat">
                <div class="stat-number" id="standardCount">0</div>
                <div class="stat-label">Standard Waiting</div>
            </div>
        </div>

        <div class="grid">
            <div class="panel">
                <h2>🎧 Live Queue</h2>
                <div id="queueList"></div>
            </div>

            <div class="panel">
                <h2>💰 Pending Crypto Payments</h2>
                <div id="pendingList"></div>
                <div class="status-box" id="statusBox">DJ dashboard ready.</div>
            </div>
        </div>
    </div>

    <script>
        const APP_URL = "https://www.boomsongrequest.com";
        let djPassword = localStorage.getItem("djPassword") || "";

        document.getElementById("djPassword").value = djPassword;

        function updateClock() {
            const now = new Date();
            document.getElementById("liveClock").innerText =
                "LIVE • " + now.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
        }

        function savePassword() {
            djPassword = document.getElementById("djPassword").value.trim();
            localStorage.setItem("djPassword", djPassword);
            setStatus("DJ password saved.");
        }

        function setStatus(message) {
            document.getElementById("statusBox").innerText = message;
        }

        function tierClass(tier) {
            if (tier === "vip") return "vip";
            if (tier === "express") return "express";
            return "standard";
        }

        async function loadQueue() {
            try {
                const response = await fetch(APP_URL + "/queue");
                const queue = await response.json();

                let vip = 0, express = 0, standard = 0;
                const queueList = document.getElementById("queueList");
                queueList.innerHTML = "";

                queue.forEach((item, index) => {
                    if (item.tier === "vip") vip++;
                    if (item.tier === "express") express++;
                    if (item.tier === "standard") standard++;

                    const div = document.createElement("div");
                    div.className = "queue-item";
                    div.innerHTML = `
                        <div class="queue-head">
                            <div>
                                <div class="song-name">#${index + 1} ${item.song}</div>
                                <div class="meta">
                                    Payment: ${item.paymentMethod || "yoco"}<br>
                                    Status: ${item.status || "pending"}
                                </div>
                            </div>
                            <div class="tier ${tierClass(item.tier)}">${item.tier.toUpperCase()}</div>
                        </div>
                        <div class="actions">
                            <button class="success-btn" onclick="markPlayed(${item.id})">Mark Played</button>
                        </div>
                    `;
                    queueList.appendChild(div);
                });

                document.getElementById("vipCount").innerText = vip;
                document.getElementById("expressCount").innerText = express;
                document.getElementById("standardCount").innerText = standard;

                if (queue.length === 0) {
                    queueList.innerHTML = `<div class="empty">No songs waiting right now.</div>`;
                }
            } catch (error) {
                console.error(error);
                setStatus("Error loading queue.");
            }
        }

        async function loadPendingCrypto() {
            try {
                const response = await fetch(APP_URL + "/pending-crypto");
                const pending = await response.json();

                const pendingList = document.getElementById("pendingList");
                pendingList.innerHTML = "";

                pending.forEach((item) => {
                    const div = document.createElement("div");
                    div.className = "pending-item";
                    div.innerHTML = `
                        <div class="pending-head">
                            <div>
                                <div class="song-name">${item.song || "Unknown Song"}</div>
                                <div class="meta">
                                    Tier: ${item.tier || "-"}<br>
                                    Method: ${item.method || "-"}<br>
                                    Payment ID: ${item.paymentId || "-"}<br>
                                    TXID: ${item.txid || "-"}<br>
                                    Submitted: ${item.submitted_at || "-"}
                                </div>
                            </div>
                            <div class="tier ${tierClass(item.tier || "standard")}">${(item.tier || "standard").toUpperCase()}</div>
                        </div>
                        <div class="actions">
                            <button class="success-btn" onclick="verifyPayment('${item.paymentId}', '${escapeQuotes(item.song)}', '${item.tier}', '${item.method}')">Approve</button>
                            <button class="danger-btn" onclick="removePendingCrypto('${item.paymentId}')">Remove</button>
                        </div>
                    `;
                    pendingList.appendChild(div);
                });

                if (pending.length === 0) {
                    pendingList.innerHTML = `<div class="empty">No pending crypto payments.</div>`;
                }
            } catch (error) {
                console.error(error);
                setStatus("Error loading pending crypto.");
            }
        }

        function escapeQuotes(text) {
            return String(text || "").replace(/'/g, "\\'");
        }

        async function markPlayed(id) {
            if (!djPassword) {
                setStatus("Enter DJ password first.");
                return;
            }

            try {
                const response = await fetch(APP_URL + "/mark-played", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ password: djPassword, id })
                });

                const data = await response.json();
                setStatus(data.message || "Song updated.");
                loadQueue();
            } catch (error) {
                console.error(error);
                setStatus("Error marking song as played.");
            }
        }

        async function clearQueue() {
            if (!djPassword) {
                setStatus("Enter DJ password first.");
                return;
            }

            const yes = confirm("Clear the whole queue?");
            if (!yes) return;

            try {
                const response = await fetch(APP_URL + "/clear-queue", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ password: djPassword })
                });

                const data = await response.json();
                setStatus(data.message || "Queue cleared.");
                loadQueue();
            } catch (error) {
                console.error(error);
                setStatus("Error clearing queue.");
            }
        }

        async function verifyPayment(paymentId, songName, tier, method) {
            if (!djPassword) {
                setStatus("Enter DJ password first.");
                return;
            }

            try {
                const response = await fetch(APP_URL + "/verify-payment", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        password: djPassword,
                        paymentId,
                        songName,
                        tier,
                        method
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    await fetch(APP_URL + "/remove-pending-crypto", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ paymentId, password: djPassword })
                    });
                }

                setStatus(data.message || "Payment verified.");
                loadQueue();
                loadPendingCrypto();
            } catch (error) {
                console.error(error);
                setStatus("Error verifying payment.");
            }
        }

        async function removePendingCrypto(paymentId) {
            if (!djPassword) {
                setStatus("Enter DJ password first.");
                return;
            }

            try {
                const response = await fetch(APP_URL + "/remove-pending-crypto", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ paymentId, password: djPassword })
                });

                const data = await response.json();
                setStatus(data.message || "Pending crypto removed.");
                loadPendingCrypto();
            } catch (error) {
                console.error(error);
                setStatus("Error removing pending crypto.");
            }
        }

        updateClock();
        loadQueue();
        loadPendingCrypto();

        setInterval(updateClock, 1000);
        setInterval(loadQueue, 5000);
        setInterval(loadPendingCrypto, 7000);
    </script>
</body>
</html>
