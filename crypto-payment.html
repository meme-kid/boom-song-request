<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Payment - BOOM Song Request</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(180deg, #090909 0%, #000 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 460px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 18px;
            padding: 24px;
            text-align: center;
        }

        h1, h3 {
            margin-top: 0;
            color: #ffd54a;
        }

        #wallet {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 14px;
            font-family: monospace;
            word-break: break-all;
            margin: 16px 0;
        }

        #qr {
            width: 220px;
            max-width: 100%;
            background: white;
            border-radius: 16px;
            padding: 10px;
            margin: 14px auto;
            display: block;
        }

        #txid {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.14);
            background: rgba(255, 255, 255, 0.08);
            color: white;
            margin-top: 16px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            margin-top: 14px;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(45deg, #ffd54a, #ff9f1a);
            color: black;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Crypto Payment</h1>
        <p id="songInfo"></p>
        <h3 id="amountText"></h3>
        <p id="wallet"></p>
        <p style="color:#ffd54a; font-size:14px;">
            ⚠️ Only send using the correct network (TRC20 for USDT)
        </p>
        <button onclick="copyWallet()">📋 Copy Wallet</button>
        <img id="qr" alt="Wallet QR Code">
        <input id="txid" placeholder="Paste Transaction ID">
        <button onclick="confirmPayment()">Confirm Payment</button>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const song = params.get("song");
        const tier = params.get("tier");
        const method = params.get("method");
        const paymentId = params.get("pid");
        const amount = params.get("amount");

        document.getElementById("songInfo").innerText =
            "Song: " + song + " | Tier: " + tier;

        let cryptoName = method === "usdt" ? "USDT (TRC20)" : "BTC";

        document.getElementById("amountText").innerText =
            "Send " + amount + " " + cryptoName;

        async function loadWallet() {
            try {
                const response = await fetch("/wallet-address?method=" + method);
                const data = await response.json();

                let wallet = data.walletAddress;

                // fallback if backend fails
                if (!wallet || wallet === "") {
                    if (method === "usdt") {
                        wallet = "TZ2HcoWgXVz8ETADBXzFUjXnduYa62F7FN";
                    } else if (method === "btc") {
                        wallet = "1HgmysQ7yTPXNby3CBj4PfUv5yff8seoqR";
                    }
                }

                document.getElementById("wallet").innerText = wallet;

                document.getElementById("qr").src =
                    "https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=" +
                    encodeURIComponent(wallet);

            } catch (error) {
                console.error("Wallet load error:", error);

                // fallback even on error
                let wallet = method === "usdt"
                    ? "TZ2HcoWgXVz8ETADBXzFUjXnduYa62F7FN"
                    : "1HgmysQ7yTPXNby3CBj4PfUv5yff8seoqR";

                document.getElementById("wallet").innerText = wallet;
            }
        }

        async function confirmPayment() {
            const txid = document.getElementById("txid").value;

            if (!txid) {
                alert("Paste transaction ID");
                return;
            }

            await fetch("/submit-txid", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    paymentId,
                    txid,
                    song,
                    tier,
                    method
                })
            });

            alert("Payment submitted. DJ will verify and add your song.");
            window.location.href = "index.html";
        }

        function copyWallet() {
            const wallet = document.getElementById("wallet").innerText;
            navigator.clipboard.writeText(wallet);
            alert("Wallet copied!");
        }

        loadWallet();
    </script>
</body>
</html>
